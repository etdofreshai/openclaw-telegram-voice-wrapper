<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#16213e"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="96" fill="url(#bg)"/>
  <!-- Microphone body -->
  <rect x="206" y="100" width="100" height="180" rx="50" fill="#e94560"/>
  <!-- Microphone arc -->
  <path d="M166 240 a90 90 0 0 0 180 0" fill="none" stroke="#e94560" stroke-width="16" stroke-linecap="round"/>
  <!-- Microphone stand -->
  <line x1="256" y1="330" x2="256" y2="390" stroke="#e94560" stroke-width="16" stroke-linecap="round"/>
  <line x1="216" y1="390" x2="296" y2="390" stroke="#e94560" stroke-width="16" stroke-linecap="round"/>
  <!-- Sound waves -->
  <path d="M340 180 a60 80 0 0 1 0 120" fill="none" stroke="#0f3460" stroke-width="12" stroke-linecap="round" opacity="0.6"/>
  <path d="M365 155 a85 105 0 0 1 0 170" fill="none" stroke="#0f3460" stroke-width="12" stroke-linecap="round" opacity="0.4"/>
</svg>
